<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte | Conversor de Unidades</title>
<meta name="description" content="Soporte al cliente de Conversor de Unidades. Contáctanos por correo electrónico.">
<style>
  :root {
    --primary: #007AFF;
    --primary-dark: #0056b3;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --border: #d2d2d7;
    --error: #ff3b30;
    --success: #34c759;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 560px;
  }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    color: var(--text-secondary);
    margin-bottom: 28px;
    font-size: 15px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }
  .required {
    color: var(--error);
    margin-left: 2px;
  }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
  }
  textarea {
    resize: vertical;
    min-height: 140px;
  }
  button {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.05s;
    font-family: inherit;
  }
  button:hover { background: var(--primary-dark); }
  button:active { transform: scale(0.99); }
  .footer-note {
    margin-top: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .footer-note a {
    color: var(--primary);
    text-decoration: none;
  }
  .footer-note a:hover { text-decoration: underline; }
  @media (max-width: 480px) {
    .card { padding: 28px 22px; border-radius: 14px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Soporte al cliente</h1>
      <p class="subtitle">¿Tienes una duda, sugerencia o problema? Escríbenos y te responderemos lo antes posible.</p>

      <form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="2f4a198e-7d27-407e-97f8-c0355f90c742">
        <input type="hidden" name="subject" value="Nuevo mensaje de soporte - Conversor de Unidades">
        <input type="hidden" name="from_name" value="Soporte Conversor de Unidades">
        <input type="checkbox" name="botcheck" style="display:none;">

        <div class="form-group">
          <label for="nombre">Nombre<span class="required">*</span></label>
          <input type="text" id="nombre" name="Nombre" required autocomplete="name" placeholder="Tu nombre completo">
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico<span class="required">*</span></label>
          <input type="email" id="email" name="Email" required autocomplete="email" placeholder="tu@correo.com">
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono <span style="color: var(--text-secondary); font-weight: 400;">(opcional)</span></label>
          <input type="tel" id="telefono" name="Teléfono" autocomplete="tel" placeholder="+34 600 000 000">
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje<span class="required">*</span></label>
          <textarea id="mensaje" name="Mensaje" required placeholder="Cuéntanos en qué podemos ayudarte..."></textarea>
        </div>

        <button type="submit">Enviar mensaje</button>
      </form>

      <p class="footer-note">
        También puedes escribirnos directamente a
        <a href="mailto:j.angel.gomez@me.com">j.angel.gomez@me.com</a>
      </p>
    </div>
  </div>
</body>
</html>
